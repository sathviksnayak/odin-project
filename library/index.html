<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBRARY</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1 class="title">Welcome to the Library</h1>
        <p class="description">Explore our collection of books and resources.</p>
        <button id="newBook-btn">Add New Book</button>
    </div>
        <div id="Library-container">
            

        </div>
<dialog id="add-book-dialog">
    <h2 style="text-align:center;color:#333;">Add New Book</h2>
    <form id="book-form">
        <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" id="title" required>
        </div>
        <div class="form-group">
        <label for="author">Author:</label>
        <input type="text" id="author" required>
        </div>
        <div    class="form-group">
        <label for="pages">Pages:</label>
        <input type="number" id="pages" required>
        </div>
        <div class="checkbox-group">
        <label for="isRead">Read:</label>
        <input type="checkbox" id="isRead">
        </div>
        <button type="button" id="cancel-btn">Cancel</button>
        <button type="submit">Add Book</button>
    </form>
    </dialog>

</body>
</html>
