<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
</head>
<body>
<header><h1>Battleship warfare</h1></header>
<div id="game-area">

    <div id="status"></div>

    <div id="content">
        <div>
            <h2>Your Board</h2>
            <div id="playerbase" class="board"></div>
        </div>

        <div>
            <h2>Computer Board</h2>
            <div id="compbase" class="board"></div>
        </div>

    </div>

</div>

<button id="start">Start New Game</button>
</body>
</html>
